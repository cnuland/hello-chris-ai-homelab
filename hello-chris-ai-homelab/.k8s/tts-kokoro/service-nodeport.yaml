apiVersion: v1
kind: Service
metadata:
  name: kokoro-tts-nodeport
  namespace: voice
  labels:
    app.kubernetes.io/name: kokoro-tts
    app.kubernetes.io/part-of: voice-assistant
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: kokoro-tts
  ports:
    - name: http
      port: 8880
      targetPort: http
      protocol: TCP
      nodePort: 31880

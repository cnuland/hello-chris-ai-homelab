apiVersion: config.openshift.io/v1
kind: OAuth
metadata:
  name: cluster
spec:
  identityProviders:
    - name: keycloak
      mappingMethod: claim
      type: OpenID
      openID:
        clientID: openshift
        clientSecret:
          name: keycloak-client-secret
        issuer: https://keycloak.apps.ironman.cjlabs.dev/realms/openshift
        claims:
          preferredUsername:
            - preferred_username
          name:
            - name
          email:
            - email

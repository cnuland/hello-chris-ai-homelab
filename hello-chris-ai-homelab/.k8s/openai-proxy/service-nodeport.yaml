apiVersion: v1
kind: Service
metadata:
  name: openai-proxy-lan
  namespace: home-assistant
  labels:
    app.kubernetes.io/name: openai-proxy
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: openai-proxy
  ports:
    - name: http
      port: 8005
      targetPort: http
      nodePort: 31280
      protocol: TCP

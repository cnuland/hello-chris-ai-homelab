apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: home-assistant
resources:
  - deployment.yaml
  - service.yaml
  - service-nodeport.yaml
  - rbac.yaml
configMapGenerator:
  - name: openai-proxy-code
    files:
      - app.py
generatorOptions:
  disableNameSuffixHash: true

apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: home-assistant
  labels:
    app.kubernetes.io/name: minio
stringData:
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: REPLACE_ME_WITH_STRONG_PASSWORD
  MINIO_ENDPOINT: http://minio.home-assistant.svc.cluster.local:9000
  MINIO_DEFAULT_BUCKET: claude-results
  MINIO_EXTERNAL_ENDPOINT: http://10.0.10.10:31290

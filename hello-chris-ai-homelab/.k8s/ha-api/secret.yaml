apiVersion: v1
kind: Secret
metadata:
  name: ha-api-credentials
  namespace: home-assistant
stringData:
  HA_BASE: http://home-assistant.home-assistant.svc.cluster.local:8123
  HA_TOKEN: REPLACE_ME_WITH_LONG_LIVED_TOKEN
  # Wyoming Voxtral (STT) — multilingual via vLLM
  STT_HOST: wyoming-voxtral.voice.svc.cluster.local
  STT_PORT: "10300"
  # Kokoro/OpenAI-compatible TTS defaults (used by configure.py)
  KOKORO_URL: http://kokoro-tts.voice.svc.cluster.local:8880/v1
  KOKORO_MODEL: kokoro
  KOKORO_VOICE: bf_emma
  KOKORO_SPEED: "1.0"
  KOKORO_INSTRUCTIONS: Use a warm, flirtatious British accent.
  # TTS entity id to prefer when setting default pipeline
  TTS_ENTITY_ID: tts.openai_tts_kokoro
  # Ollama (OpenAI-compatible) for conversation
  OLLAMA_URL: http://openai-proxy.home-assistant.svc.cluster.local:8005/v1
  OLLAMA_UPSTREAM: http://ollama-gpt-oss-120b.gpt-oss.svc.cluster.local:11434
  OLLAMA_MODEL: gpt-oss:120b
  # LlamaStack server (used when PROXY_BACKEND=llamastack)
  LLAMASTACK_URL: http://llama-stack-server.llama-stack.svc.cluster.local:8080
  # Proxy generation caps (can be tuned at runtime)
  PROXY_DEFAULT_MAX_TOKENS: "256"
  PROXY_MAX_TOKENS_CAP: "120"
  # Home Assistant URLs (used by postinstall to set configuration.yaml)
  HA_INTERNAL_URL: http://10.0.10.10:31273
  HA_EXTERNAL_URL: https://home-assistant-home-assistant.apps.ironman.cjlabs.dev
  # TTS timeout for OpenAI TTS integration patch (seconds)
  OPENAI_TTS_TIMEOUT: "180"
  # Namespace keyword→namespace mapping used by proxy to infer defaults
  PROXY_NS_ALIASES: minecraft:minecraft
  # Weather defaults for proxy fallback
  WEATHER_UNITS: imperial
  OPEN_METEO_GEOCODE: https://geocoding-api.open-meteo.com/v1/search
  OPEN_METEO_FORECAST: https://api.open-meteo.com/v1/forecast
  # Voice assistant media player entity for TTS push notifications
  HA_MEDIA_PLAYER: media_player.home_assistant_voice_0a58e3_media_player
  # Web search (Tavily) API key for proxy tool execution
  TAVILY_API_KEY: REPLACE_ME
